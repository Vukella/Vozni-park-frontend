server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────
    # React Router support — always serve index.html
    # for any route not found as a real file
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────
    # Proxy all /api calls to Spring Boot backend
    # "backend" resolves via Docker's internal DNS
    # ─────────────────────────────────────────
location /api {
    proxy_pass https://vozni-park-dya3c9e0dhamfdf2.swedencentral-01.azurewebsites.net;
    proxy_http_version 1.1;

    proxy_set_header Host              vozni-park-dya3c9e0dhamfdf2.swedencentral-01.azurewebsites.net;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;
}

    # ─────────────────────────────────────────
    # Cache static assets aggressively
    # ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
